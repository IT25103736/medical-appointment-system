<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-8">

<div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow">

    <h1 class="text-2xl font-bold mb-4">Patient Management</h1>

    <!-- FORM -->
    <div class="grid grid-cols-4 gap-2 mb-4">
        <input id="name" placeholder="Name" class="border p-2 rounded">
        <input id="contact" placeholder="Contact" class="border p-2 rounded">
        <input id="address" placeholder="Address" class="border p-2 rounded">
        <button onclick="addOrUpdate()" id="submitBtn"
                class="bg-blue-500 text-white rounded px-4">Add</button>
    </div>

    <!-- TABLE -->
    <table class="w-full border">
        <thead class="bg-gray-200">
        <tr>
            <th class="p-2">Name</th>
            <th>Contact</th>
            <th>Address</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

</div>

<script>
    const API = "http://localhost:8080/patients";

    let editId = null;
    let allPatients = [];

    function loadPatients() {
      fetch(API)
        .then(res => res.json())
        .then(data => {
          allPatients = data;
          displayPatients(data);
        })
        .catch(() => alert("Error loading patients"));
    }

    function displayPatients(data) {
      let body = document.getElementById("tableBody");
      body.innerHTML = "";

      data.forEach(p => {
        body.innerHTML += `
          <tr class="border">
            <td class="p-2">${p.name}</td>
            <td>${p.contact}</td>
            <td>${p.address}</td>
            <td>
              <button onclick="editPatient(${p.id}, '${p.name}', '${p.contact}', '${p.address}')"
                class="bg-yellow-400 px-2 rounded">Edit</button>

              <button onclick="deletePatient(${p.id})"
                class="bg-red-500 text-white px-2 rounded">Delete</button>
            </td>
          </tr>
        `;
      });
    }

    // 🔍 SEARCH
    function searchPatients() {
      let keyword = document.getElementById("search").value.toLowerCase();

      let filtered = allPatients.filter(p =>
        p.name.toLowerCase().includes(keyword)
      );

      displayPatients(filtered);
    }

    // ✅ VALIDATION + MESSAGES
    function addOrUpdate() {
      let name = document.getElementById("name").value.trim();
      let contact = document.getElementById("contact").value.trim();
      let address = document.getElementById("address").value.trim();

      if (!name || !contact || !address) {
        alert("All fields are required!");
        return;
      }

      const data = {
        id: editId || Date.now(),
        name,
        contact,
        address
      };

      if (editId) {
        fetch(API + "/" + editId, {
          method: "PUT",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(data)
        })
        .then(() => {
          alert("Patient updated successfully!");
          resetForm();
          loadPatients();
        })
        .catch(() => alert("Error updating patient"));
      } else {
        fetch(API, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(data)
        })
        .then(() => {
          alert("Patient added successfully!");
          loadPatients();
        })
        .catch(() => alert("Error adding patient"));
      }
    }

    function editPatient(id, name, contact, address) {
      editId = id;
      document.getElementById("name").value = name;
      document.getElementById("contact").value = contact;
      document.getElementById("address").value = address;

      document.getElementById("submitBtn").innerText = "Update";
    }

    // ✅ CONFIRM DELETE
    function deletePatient(id) {
      if (!confirm("Are you sure you want to delete this patient?")) return;

      fetch(API + "/" + id, { method: "DELETE" })
        .then(() => {
          alert("Patient deleted successfully!");
          loadPatients();
        })
        .catch(() => alert("Error deleting patient"));
    }

    function resetForm() {
      editId = null;
      document.getElementById("name").value = "";
      document.getElementById("contact").value = "";
      document.getElementById("address").value = "";
      document.getElementById("submitBtn").innerText = "Add";
    }

    loadPatients();
</script>

</body>
</html>
