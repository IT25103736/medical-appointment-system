<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-8">

<div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow">

    <h1 class="text-2xl font-bold mb-4">Patient Management</h1>

    <!-- FORM -->
    <div class="grid grid-cols-4 gap-2 mb-4">
        <input id="name" placeholder="Name" class="border p-2 rounded">
        <input id="contact" placeholder="Contact" class="border p-2 rounded">
        <input id="address" placeholder="Address" class="border p-2 rounded">
        <button onclick="addOrUpdate()" id="submitBtn"
                class="bg-blue-500 text-white rounded px-4">Add</button>
    </div>

    <!-- TABLE -->
    <table class="w-full border">
        <thead class="bg-gray-200">
        <tr>
            <th class="p-2">Name</th>
            <th>Contact</th>
            <th>Address</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

</div>

<script>
    const API = "http://localhost:8080/patients";

    let editId = null;

    function loadPatients() {
      fetch(API)
        .then(res => res.json())
        .then(data => {
          let body = document.getElementById("tableBody");
          body.innerHTML = "";

          data.forEach(p => {
            body.innerHTML += `
              <tr class="border">
                <td class="p-2">${p.name}</td>
                <td>${p.contact}</td>
                <td>${p.address}</td>
                <td>
                  <button onclick="editPatient(${p.id}, '${p.name}', '${p.contact}', '${p.address}')"
                    class="bg-yellow-400 px-2 rounded">Edit</button>

                  <button onclick="deletePatient(${p.id})"
                    class="bg-red-500 text-white px-2 rounded">Delete</button>
                </td>
              </tr>
            `;
          });
        });
    }

    function addOrUpdate() {
      const data = {
        id: editId || Date.now(),
        name: document.getElementById("name").value,
        contact: document.getElementById("contact").value,
        address: document.getElementById("address").value
      };

      if (editId) {
        fetch(API + "/" + editId, {
          method: "PUT",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(data)
        }).then(() => {
          resetForm();
          loadPatients();
        });
      } else {
        fetch(API, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(data)
        }).then(() => {
          loadPatients();
        });
      }
    }

    function editPatient(id, name, contact, address) {
      editId = id;
      document.getElementById("name").value = name;
      document.getElementById("contact").value = contact;
      document.getElementById("address").value = address;

      document.getElementById("submitBtn").innerText = "Update";
    }

    function deletePatient(id) {
      fetch(API + "/" + id, { method: "DELETE" })
        .then(loadPatients);
    }

    function resetForm() {
      editId = null;
      document.getElementById("name").value = "";
      document.getElementById("contact").value = "";
      document.getElementById("address").value = "";
      document.getElementById("submitBtn").innerText = "Add";
    }

    loadPatients();
</script>

</body>
</html>
